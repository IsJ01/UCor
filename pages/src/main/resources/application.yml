logging:
  level:
    root: FATAL

server:
  port: 8011

spring:
  application: 
    name: pages
  datasource:
    url: jdbc:postgresql://localhost:5435/postgres
    username: postgres
    password: pass
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        show-sql: true
        format-sql: true
        hbm2ddl:
          auto: update
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
